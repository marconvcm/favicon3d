<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="" id="faviconLink" />
  <title>Cube Favicon</title>
</head>

<body>
  <canvas id="favicon"></canvas>
  <script src="main.js"></script>
  <style>
    body,
    button {
      font-family: Monospace;
      text-align: center;
    }

    button {
      font-size: 1.5em;
      padding: 0.5em 1em;
      margin: 0.5em;
    }

    canvas {
      display: none;
    }

    div {
      max-width: 100vw;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
  </style>
  <div>
    <p>
      Cube is drawing on your favicon. You can pause and play the animation using the buttons below.
    </p>
    <aside>
      <button onclick="play()">Play</button>
      <button onclick="pause()">Pause</button>
    </aside>
    <p>
      Thanks <a href="https://github.com/tsoding/formula" target="_blank">https://github.com/tsoding/formula</a>
    </p>
  </div>
</body>

</html>
